<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Entry - My Memory Journal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/design-system.css">
</head>
<body>

  <nav>
    <div class="logo">My Memory Journal</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="new.html">Create Entry</a></li>
      <li><a href="entries.html">My Entries</a></li>
      <li class="theme-controls">
        <label for="theme-selector" class="sr-only">Choose wall theme</label>
        <select id="theme-selector" class="theme-selector" aria-label="Choose wall theme">
          <option value="cloudy">Cloudy</option>
          <option value="nature">Nature</option>
          <option value="windy">Windy</option>
          <option value="disney">Disney-style</option>
        </select>
        <button id="theme-toggle" class="icon-btn" title="Switch to next wall theme" aria-label="Switch to next wall theme">
          <i class="fas fa-cloud"></i>
        </button>
      <li class="auth-slot">
    </ul>
  </nav>

  <main>
    <div class="view-container">
      <div class="view-header">
        <div class="view-badges-row">
          <span class="view-badge" id="view-privacy"></span>
          <span class="view-badge" id="view-favorite"></span>
          <span class="view-badge" id="view-location"></span>
        </div>
        <div class="view-meta">
          <span class="view-date" id="view-date"></span>
          <span class="mood" id="view-mood"></span>
        </div>
        <h2 class="view-title" id="view-title"></h2>
      </div>
      
      <div class="view-gallery" id="view-gallery"></div>
      
      <div class="view-content rich-view" id="view-content"></div>
      
      <div class="action-bar">
        <button id="edit-btn" class="btn btn-secondary"><i class="fas fa-edit"></i> Edit Entry</button>
        <button id="delete-entry-btn" class="btn btn-danger"><i class="fas fa-trash"></i> Delete Entry</button>
      </div>
    </div>
  </main>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3>Delete Entry?</h3>
      <p>Are you sure you want to delete this memory? This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancel-delete">Cancel</button>
        <button class="btn btn-danger" id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/layout.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

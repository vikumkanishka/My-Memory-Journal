<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Entry - My Memory Journal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>

  <nav class="site-nav" aria-label="Primary">
    <a href="index.html" class="logo">📔 Memory Journal</a>
    <button
      id="menu-toggle"
      class="menu-toggle"
      type="button"
      aria-label="Open navigation menu"
      aria-controls="primary-navigation"
      aria-expanded="false"
    >
      <span class="menu-toggle-bar" aria-hidden="true"></span>
      <span class="menu-toggle-bar" aria-hidden="true"></span>
      <span class="menu-toggle-bar" aria-hidden="true"></span>
    </button>
    <ul id="primary-navigation" class="nav-links" role="list">
      <li><a href="index.html">Home</a></li>
      <li><a href="new.html">Create Journal</a></li>
      <li><a href="entries.html" class="active" aria-current="page">My Entries</a></li>
      <li><a href="mood-tracker.html">Mood Tracker</a></li>
      <li class="profile-item">
        <button
          id="profile-menu-button"
          class="profile-trigger"
          type="button"
          aria-haspopup="true"
          aria-expanded="false"
          aria-controls="profile-dropdown"
        >
          <span id="profile-menu-label">Profile</span>
          <i class="fas fa-chevron-down" aria-hidden="true"></i>
        </button>
        <ul id="profile-dropdown" class="profile-dropdown" role="menu" aria-label="Profile options">
          <li role="none"><a role="menuitem" href="edit-profile.html">Edit Profile</a></li>
          <li role="none"><a role="menuitem" href="edit-profile.html#memory-wall" aria-label="Choose Memory Wall (Themes)"><i class="fas fa-palette" aria-hidden="true"></i></a></li>
          <li role="none"><button type="button" class="profile-logout" role="menuitem" id="profile-logout-button">Logout</button></li>
        </ul>
      </li>
    </ul>
  </nav>

  <div id="nav-overlay" class="nav-overlay" aria-hidden="true"></div>

  <main>
    <div class="view-container">
      <div class="view-header">
        <div class="view-badges-row">
          <span class="view-badge" id="view-privacy"></span>
          <span class="view-badge" id="view-favorite"></span>
          <span class="view-badge" id="view-location"></span>
        </div>
        <div class="view-meta">
          <span class="view-date" id="view-date"></span>
          <span class="mood" id="view-mood"></span>
        </div>
        <h2 class="view-title" id="view-title"></h2>
      </div>
      
      <div class="view-gallery" id="view-gallery"></div>
      
      <div class="view-content rich-view" id="view-content"></div>
      
      <div class="action-bar">
        <button id="download-entry-btn" class="btn btn-secondary"><i class="fas fa-download"></i> Download Entry</button>
        <button id="delete-entry-btn" class="btn btn-danger"><i class="fas fa-trash"></i> Delete Entry</button>
      </div>
    </div>
  </main>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3>Delete Entry?</h3>
      <p>Are you sure you want to delete this memory? This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancel-delete">Cancel</button>
        <button class="btn btn-danger" id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <script src="navbar.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

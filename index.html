<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Memory Journal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav>
    <div class="logo">📔 Memory Journal</div>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="new.html">Create Entry</a></li>
      <li><a href="entries.html">My Entries</a></li>
      <li id="auth-container" style="display: flex; gap: 1rem; align-items: center;">
        <!-- Login/Register buttons or User Menu will go here -->
      </li>
      <li class="theme-controls">
        <label for="theme-selector" class="sr-only">Choose wall theme</label>
        <select id="theme-selector" class="theme-selector" aria-label="Choose wall theme">
          <option value="cloudy">Cloudy</option>
          <option value="nature">Nature</option>
          <option value="windy">Windy</option>
          <option value="disney">Disney-style</option>
        </select>
        <button id="theme-toggle" class="icon-btn" title="Switch to next wall theme" aria-label="Switch to next wall theme">
          <i class="fas fa-cloud"></i>
        </button>
      </li>
    </ul>
  </nav>

  <main>
    <section class="hero" id="hero-banner" style="background-image: url('assets/images/welcome_background.png');">
      <div class="hero-content">
        <h1>Welcome to Your Mental Oasis</h1>
        <p>A safe, private space to write your thoughts, save your memories, and reflect on your daily life. Stored completely local to your device.</p>
        <div class="hero-buttons">
          <a href="new.html" class="btn btn-primary"><i class="fas fa-pen"></i> Start Writing</a>
          <a href="entries.html" class="btn btn-secondary"><i class="fas fa-book-open"></i> View Entries</a>
        </div>
      </div>
    </section>
<div>
  
</div>
    <div class="quote-section" id="daily-quote">
      <!-- Quote will be randomly inserted here by JS -->
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Initialize authentication UI
    function initializeAuthUI() {
      const authContainer = document.getElementById('auth-container');
      const currentUser = getCurrentUser();

      if (currentUser) {
        // User is logged in - show user menu
        authContainer.innerHTML = `
          <span style="color: var(--text-color); font-size: 0.95rem;">
            Welcome, <strong>${currentUser.fullName}</strong>
          </span>
          <button onclick="logout()" style="
            padding: 0.5rem 1rem;
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
          " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            Logout
          </button>
        `;
      } else {
        // User not logged in - show login/register buttons
        authContainer.innerHTML = `
          <a href="login.html" style="
            padding: 0.5rem 1rem;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-block;
          " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 15px rgba(244,194,194,0.3)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
            Log In
          </a>
          <a href="register.html" style="
            padding: 0.5rem 1rem;
            background-color: var(--secondary-color);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-block;
          " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 15px rgba(216,180,226,0.3)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
            Sign Up
          </a>
        `;
      }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', initializeAuthUI);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - Memory Journal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>
  <nav class="site-nav" aria-label="Primary">
    <a href="index.html" class="logo">📔 Memory Journal</a>
    <button
      id="menu-toggle"
      class="menu-toggle"
      type="button"
      aria-label="Open navigation menu"
      aria-controls="primary-navigation"
      aria-expanded="false"
    >
      <span class="menu-toggle-bar" aria-hidden="true"></span>
      <span class="menu-toggle-bar" aria-hidden="true"></span>
      <span class="menu-toggle-bar" aria-hidden="true"></span>
    </button>
    <ul id="primary-navigation" class="nav-links" role="list">
      <li><a href="index.html">Home</a></li>
      <li><a href="new.html">Create Journal</a></li>
      <li><a href="entries.html">My Entries</a></li>
      <li><a href="mood-tracker.html">Mood Tracker</a></li>
      <li class="profile-item">
        <button
          id="profile-menu-button"
          class="profile-trigger"
          type="button"
          aria-haspopup="true"
          aria-expanded="false"
          aria-controls="profile-dropdown"
        >
          <span id="profile-menu-label">Profile</span>
          <i class="fas fa-chevron-down" aria-hidden="true"></i>
        </button>
        <ul id="profile-dropdown" class="profile-dropdown" role="menu" aria-label="Profile options">
          <li role="none"><a role="menuitem" href="edit-profile.html" class="active" aria-current="page">Edit Profile</a></li>
          <li role="none">
            <div class="theme-switcher" role="group" aria-label="Change memory wall theme">
              <button class="theme-icon-btn" data-theme="cloudy" aria-label="Cloudy theme" title="Cloudy">☁️</button>
              <button class="theme-icon-btn" data-theme="nature" aria-label="Nature theme" title="Nature">🌿</button>
              <button class="theme-icon-btn" data-theme="windy" aria-label="Windy theme" title="Windy">💨</button>
              <button class="theme-icon-btn" data-theme="disney" aria-label="Magical theme" title="Magical">✨</button>
            </div>
          </li>
          <li role="none"><button type="button" class="profile-logout" role="menuitem" id="profile-logout-button">Logout</button></li>
        </ul>
      </li>
    </ul>
  </nav>

  <div id="nav-overlay" class="nav-overlay" aria-hidden="true"></div>

  <main class="profile-page">
    <section class="profile-panel" aria-labelledby="profile-heading">
      <h1 id="profile-heading">Edit Profile</h1>
      <p>Update your display name and preferred email. Your profile is kept on this device.</p>

      <form id="profile-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="profile-full-name">Full Name</label>
          <input id="profile-full-name" class="form-control" type="text" placeholder="Your full name">
        </div>

        <div class="form-group">
          <label for="profile-email">Email</label>
          <input id="profile-email" class="form-control" type="email" placeholder="you@example.com">
        </div>

        <div class="profile-actions">
          <button type="submit" class="btn btn-primary">Save Profile</button>
        </div>
      </form>
    </section>

    <section class="profile-panel" id="theme-selection" aria-labelledby="theme-selection-heading">
      <h2 id="theme-selection-heading">Choose Your Theme</h2>
      <p>Select your preferred memory wall theme. Your choice is saved across all pages.</p>

      <div class="mood-selector" id="profileThemeSelector" role="radiogroup" aria-label="Theme selection">
        <!-- Themes will be populated by JavaScript -->
      </div>

      <div class="profile-actions">
        <button id="save-theme-btn" type="button" class="btn btn-primary">Save Theme</button>
      </div>
    </section>
  </main>

  <script src="navbar.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/edit-profile.js"></script>
</body>
</html>

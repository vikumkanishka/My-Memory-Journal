<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with Saai - My Memory Journal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/saai.css">
</head>
<body>
  <nav>
    <div class="logo">My Memory Journal</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="new.html">New Entry</a></li>
      <li><a href="saai.html" class="active">Chat with Saai</a></li>
      <li><a href="entries.html">My Entries</a></li>
      <li>
        <button id="theme-toggle" class="icon-btn" title="Toggle Dark Mode">
          <i class="fas fa-moon"></i>
        </button>
      </li>
    </ul>
  </nav>

  <main class="chat-container">
    <div class="phone-mockup">
      <div class="chat-header">
        <div class="avatar">
          <i class="fas fa-robot"></i>
        </div>
        <div class="chat-info">
          <h3>Saai</h3>
          <p>Your AI Friend</p>
        </div>
        <button id="api-key-btn" class="icon-btn" title="Set Gemini API Key"><i class="fas fa-key"></i></button>
      </div>

      <div class="chat-messages" id="chat-messages">
        <!-- Messages render here -->
      </div>

      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <!-- API Key Modal -->
  <div class="modal-overlay" id="api-modal">
    <div class="modal">
      <h3>Gemini API Key</h3>
      <p>This key is managed by the app configuration. Users do not need to provide their own API key.</p>
      <div class="form-group">
        <input type="password" id="api-key-input" class="form-control" placeholder="Managed by app admin" readonly>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancel-api">Cancel</button>
        <button class="btn btn-primary" id="save-api" disabled>Save Key</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/saai.config.js"></script>
  <script src="js/saai.js"></script>
</body>
</html>
